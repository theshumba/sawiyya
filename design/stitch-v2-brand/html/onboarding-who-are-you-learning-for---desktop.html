<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('.card-onboarding').forEach(card => {
            card.addEventListener('click', () => {
                // Remove active state from others
                document.querySelectorAll('.card-pressed').forEach(c => {
                    c.classList.remove('card-pressed', 'border-coral', 'ring-4', 'ring-coral/20');
                    c.classList.add('card-onboarding', 'border-primary/20');
                    const text = c.querySelector('span');
                    if(text) text.classList.remove('text-coral');
                    const check = c.querySelector('.absolute');
                    if(check) check.remove();
                });

                // Set this one to active (simulated)
                card.classList.add('card-pressed', 'border-coral');
                const text = card.querySelector('span');
                if(text) text.classList.add('text-coral');
            });
        });
    </script>
