<script id="tailwind-config">

                        primary: '#0F6E6A',
                        'primary-dark': '#0A4F4C',

                        gold: '#E6B24C',

                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "2rem",

<style>

        .extruded-coral {

            transform: translateY(4px);
        }
        .extruded-teal {
            box-shadow: 0 4px 0 #0A4F4C;

        .extruded-gold {

            box-shadow: 0 4px 0 rgba(0,0,0,0.05);

        .hide-scrollbar::-webkit-scrollbar {

            -ms-overflow-style: none;

</div>
<!-- Pagination / Load More spacer -->

<button class="text-primary font-bold flex items-center gap-2">
                Show more

<!-- Expanded Peek Overlay (Initially Visible for Demo) -->
<div class="fixed inset-0 bg-ink/40 backdrop-blur-sm z-[60] flex items-end justify-center" id="peek-overlay">
<div class="bg-paper w-full max-w-lg rounded-t-[3rem] p-8 shadow-2xl relative animate-in slide-in-from-bottom duration-300">

<script>
        // Micro-interaction: Close peek overlay on background click
        document.getElementById('peek-overlay').addEventListener('click', function(e) {
            if (e.target === this) {
                this.style.display = 'none';
            }
        });
        
        // Add active states to filters
        const filterButtons = document.querySelectorAll('.hide-scrollbar button');
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => {
                    b.classList.remove('bg-primary', 'text-paper', 'extruded-teal');
                    b.classList.add('bg-paper', 'text-ink/70', 'border-b-4', 'border-black/10');
                });
                btn.classList.add('bg-primary', 'text-paper', 'extruded-teal');
                btn.classList.remove('bg-paper', 'text-ink/70', 'border-b-4', 'border-black/10');
            });
        });
    </script>
