<!DOCTYPE html>

<html class="light" dir="ltr" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&amp;family=Lexend:wght@300;400;600&amp;family=Readex+Pro:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .font-headline { font-family: 'Rubik', sans-serif; }
        .font-display { font-family: 'Rubik', sans-serif; }
        .font-body { font-family: 'Lexend', 'Readex Pro', sans-serif; }
        .font-label { font-family: 'Rubik', sans-serif; }

        .extruded-coral {
            box-shadow: 0 6px 0 0 #B64532;
        }
        .extruded-teal {
            box-shadow: 0 6px 0 0 #0A4F4C;
        }
        .extruded-coral:active, .extruded-teal:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 0 #B64532;
        }
        .extruded-teal:active {
            box-shadow: 0 2px 0 0 #0A4F4C;
        }

        .bowl-arc {
            clip-path: ellipse(120% 100% at 50% 100%);
        }

        @keyframes scan-glow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        .animate-scan {
            animation: scan-glow 2s ease-in-out infinite;
        }

        .progress-glow {
            box-shadow: 0 0 15px rgba(230, 178, 76, 0.6);
        }

        .circle-progress {
            stroke-dasharray: 283;
            stroke-dashoffset: 70; /* ~75% complete */
            transition: stroke-dashoffset 0.5s ease;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: '#0F6E6A',
                        'primary-dark': '#0A4F4C',
                        ink: '#16302E',
                        coral: '#E8654C',
                        gold: '#E6B24C',
                        sand: '#F6EFE3',
                        paper: '#FBF7EF',
                    },
                    borderRadius: {
                        'DEFAULT': '0.5rem',
                        'lg': '1rem',
                        'xl': '1.5rem',
                        '2xl': '2rem',
                        '3xl': '2.5rem',
                        'full': '9999px'
                    },
                    fontFamily: {
                        headline: ["Rubik"],
                        display: ["Rubik"],
                        body: ["Lexend"],
                        label: ["Rubik"]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-sand font-body text-ink min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Bar Navigation (Shared Component Logic) -->
<nav class="fixed top-0 w-full z-50 flex items-center justify-between px-6 py-4 bg-primary dark:bg-primary-dark text-paper rounded-b-xl border-b-4 border-primary-dark shadow-md">
<div class="flex items-center gap-3">
<button class="active:translate-y-0.5 transition-all hover:opacity-80">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="font-headline text-xl font-bold uppercase tracking-wider">Sawiyya</h1>
</div>
<button class="active:translate-y-0.5 transition-all hover:opacity-80">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</nav>
<main class="flex-grow pt-24 pb-32 px-4 max-w-lg mx-auto w-full flex flex-col gap-6">
<!-- Header Section -->
<header class="bg-primary rounded-3xl p-6 shadow-xl relative overflow-hidden">
<div class="absolute top-0 right-0 p-2 opacity-10">
<span class="material-symbols-outlined text-8xl" style="font-variation-settings: 'FILL' 1;">videocam</span>
</div>
<div class="relative z-10 flex items-center justify-between gap-4">
<div class="flex-1">
<h2 class="text-white font-headline text-2xl leading-tight">Sign: I love you · أحبك</h2>
<p class="text-white/80 text-sm mt-1 font-label uppercase tracking-widest">Exercise 4 of 12</p>
</div>
<div class="w-16 h-16 bg-white/20 backdrop-blur-md rounded-2xl border-2 border-gold flex items-center justify-center p-1 overflow-hidden">
<img alt="Reference sign for I love you" class="w-full h-full object-cover rounded-xl" data-alt="A stylized flat illustration of a human hand performing the I Love You sign language gesture. The hand has warm skin tones and thick rounded outlines in deep teal. It is set against a clean, minimal background in desert sand color with a few gold sparkles floating around to signify achievement and clarity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCJwzCp5OgEVGe0tWZSZgZRAQua05jFKxx5B_LoVe9YYYUGQpMpkGTpZ1zYopYQRKWrfdEDrq-Ggd0aEM5kkjnZe79ETIP7-8TnYgl0S4hKabd2Gy-xJmeL6o22RUMszk8uSGSc_HHikbcjnwxFDSrRxZMxq4sdGV1aOJTJ7KLc18QV1y16er9PTkrNJbLQrmfJExBA-6lQIfKqYLV9QDKR_Cliv-hBQquhQp8HDeV3PGN_BzFpykAc5H-UG6yF6bxK2MJSFY42nQSX"/>
</div>
</div>
</header>
<!-- Camera Viewport Section -->
<section class="relative aspect-[4/5] bg-ink rounded-3xl overflow-hidden shadow-2xl border-4 border-white/10 group">
<!-- Simulated Camera Feed Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-ink/80 via-transparent to-transparent z-10"></div>
<!-- Hand Skeleton Visualization -->
<div class="absolute inset-0 flex items-center justify-center z-20">
<svg class="w-4/5 h-4/5 text-gold/40 animate-scan" viewbox="0 0 400 400">
<!-- Stylized Skeleton Lines -->
<path d="M200 350 Q180 300 180 250 M180 250 L140 220 L100 120 M180 250 L180 180 L180 150 M180 250 L220 180 L220 150 M180 250 L260 220 L300 120 M140 220 L70 240" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="4"></path>
<!-- Joint Dots -->
<circle cx="100" cy="120" fill="#E8654C" r="6"></circle>
<circle cx="300" cy="120" fill="#E8654C" r="6"></circle>
<circle cx="180" cy="150" fill="#E8654C" opacity="0.5" r="4"></circle>
<circle cx="220" cy="150" fill="#E8654C" opacity="0.5" r="4"></circle>
<circle cx="70" cy="240" fill="#E8654C" r="6"></circle>
</svg>
</div>
<!-- UI Overlays -->
<div class="absolute top-4 left-4 z-30 flex gap-2">
<div class="bg-primary/90 text-white px-3 py-1.5 rounded-full flex items-center gap-2 text-xs font-bold uppercase tracking-wider backdrop-blur-sm">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">back_hand</span>
                    Hand detected
                </div>
</div>
<div class="absolute top-4 right-4 z-30">
<div class="bg-black/40 text-white/80 px-2 py-1 rounded-lg text-[10px] font-bold">30 FPS</div>
</div>
<!-- Hold-to-Confirm Ring -->
<div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-30 flex flex-col items-center gap-4">
<div class="relative w-20 h-20 flex items-center justify-center">
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle cx="40" cy="40" fill="transparent" r="36" stroke="rgba(255,255,255,0.1)" stroke-width="8"></circle>
<circle class="circle-progress" cx="40" cy="40" fill="transparent" r="36" stroke="#E6B24C" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-primary text-3xl font-bold">check</span>
</div>
</div>
<span class="text-white font-label font-bold text-xs uppercase tracking-widest drop-shadow-md">Hold to confirm</span>
</div>
<!-- Sparkling atmospheric effect -->
<div class="absolute inset-0 pointer-events-none z-25">
<div class="absolute top-1/4 left-1/3 w-2 h-2 bg-gold rounded-full blur-[2px] opacity-60"></div>
<div class="absolute top-1/2 right-1/4 w-1.5 h-1.5 bg-gold rounded-full blur-[1px] opacity-40"></div>
<div class="absolute bottom-1/3 left-1/2 w-3 h-3 bg-white rounded-full blur-[4px] opacity-30"></div>
</div>
</section>
<!-- Confidence Meter -->
<div class="space-y-3 px-2">
<div class="flex justify-between items-end mb-1">
<span class="text-primary font-bold text-sm">Almost…</span>
<span class="text-primary font-bold text-lg">وصلت!</span>
</div>
<div class="h-5 w-full bg-paper rounded-full border-2 border-ink/10 p-1 overflow-hidden shadow-inner">
<div class="h-full bg-gold rounded-full progress-glow flex items-center justify-end pr-2 transition-all duration-700" style="width: 82%;">
<div class="w-2 h-2 bg-white/50 rounded-full animate-pulse"></div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-4 flex flex-col gap-6 items-center">
<button class="w-full bg-primary extruded-teal py-5 rounded-3xl flex flex-col items-center justify-center gap-1 transition-transform">
<span class="text-white font-headline text-lg flex items-center gap-2">
<span class="material-symbols-outlined">check_circle</span>
                    ✓ I signed it right — أدّيتها صح
                </span>
<span class="text-white/60 text-[10px] font-label uppercase tracking-widest">you know your hands</span>
</button>
<button class="text-primary/60 font-label font-bold text-sm uppercase tracking-[0.2em] hover:text-primary transition-colors py-2">
                Skip
            </button>
</div>
<!-- Privacy Reassurance -->
<div class="mt-4 flex justify-center">
<div class="bg-white/50 backdrop-blur-sm border border-ink/5 rounded-full px-4 py-2 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-base">verified_user</span>
<p class="text-[10px] font-medium text-ink/70 leading-none">
                    100% on your device — no video ever leaves your phone.
                </p>
</div>
</div>
</main>
<!-- Bottom Navigation (Shared Component Logic) -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-paper dark:bg-ink border-t-4 border-sand dark:border-ink shadow-[0_-4px_10px_rgba(0,0,0,0.05)] flex justify-around items-center px-4 pt-3 pb-6 rounded-t-xl">
<a class="flex flex-col items-center justify-center text-ink/60 dark:text-paper/60 active:scale-95 duration-100 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">home</span>
<span class="font-label font-bold text-[10px] uppercase tracking-widest mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary/10 text-primary rounded-full px-4 py-1 border-b-4 border-gold active:scale-95 duration-100" href="#">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">videocam</span>
<span class="font-label font-bold text-[10px] uppercase tracking-widest mt-1">Camera</span>
</a>
<a class="flex flex-col items-center justify-center text-ink/60 dark:text-paper/60 active:scale-95 duration-100 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">favorite</span>
<span class="font-label font-bold text-[10px] uppercase tracking-widest mt-1">Family</span>
</a>
<a class="flex flex-col items-center justify-center text-ink/60 dark:text-paper/60 active:scale-95 duration-100 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">leaderboard</span>
<span class="font-label font-bold text-[10px] uppercase tracking-widest mt-1">Progress</span>
</a>
</nav>
<script>
        // Micro-interaction for the confirm button progress simulation
        const circle = document.querySelector('.circle-progress');
        let progress = 70;
        
        setInterval(() => {
            progress = progress >= 95 ? 70 : progress + Math.random() * 2;
            const offset = 283 - (283 * progress / 100);
            circle.style.strokeDashoffset = offset;
        }, 1000);

        // Feedback on primary button click
        document.querySelector('.extruded-teal').addEventListener('click', () => {
            const sparkles = ['✨', '🌟', '🎉'];
            for(let i=0; i<5; i++) {
                const el = document.createElement('div');
                el.innerText = sparkles[Math.floor(Math.random() * sparkles.length)];
                el.style.position = 'fixed';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = '80vh';
                el.style.fontSize = '24px';
                el.style.transition = 'all 1s ease-out';
                el.style.zIndex = '100';
                document.body.appendChild(el);
                setTimeout(() => {
                    el.style.transform = `translateY(-200px) scale(2) rotate(${Math.random() * 360}deg)`;
                    el.style.opacity = '0';
                }, 50);
                setTimeout(() => el.remove(), 1000);
            }
        });
    </script>
</body></html>
