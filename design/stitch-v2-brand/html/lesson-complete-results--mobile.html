<script>
        // Micro-interaction for stat cards count-up feel
        document.addEventListener('DOMContentLoaded', () => {
            const xpValue = 85;
            const accuracyValue = 90;
            const xpDisplay = document.querySelector('.font-display');
            const accuracyDisplay = document.querySelector('.font-headline.text-2xl');
            
            let countXP = 0;
            let countAcc = 0;
            
            const timer = setInterval(() => {
                if(countXP < xpValue) countXP += 5;
                if(countAcc < accuracyValue) countAcc += 2;
                
                xpDisplay.innerText = `+${countXP}`;
                accuracyDisplay.innerText = `${countAcc}%`;
                
                if(countXP >= xpValue && countAcc >= accuracyValue) clearInterval(timer);
            }, 50);
        });
    </script>
