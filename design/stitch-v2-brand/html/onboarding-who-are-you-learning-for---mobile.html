            top: 4px;
            box-shadow: 0 2px 0 0 #C59840;

        .meeting-curve {
            clip-path: ellipse(120% 100% at 50% 100%);
        }

        .floating-sparkle {
            animation: float 3s ease-in-out infinite;

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }

<script>
        // Simple Interaction Logic
        document.querySelectorAll('.extruded-card-teal').forEach(card => {
            card.addEventListener('click', function() {
                // Remove pressed state from all others
                document.querySelectorAll('.extruded-card-teal').forEach(c => {
                    c.classList.remove('pressed');
                    // Remove checkmark indicator if exists
                    const check = c.querySelector('.absolute.-top-3');
                    if (check) check.remove();
                });
                
                // Add pressed state to this one
                this.classList.add('pressed');
                
                // Add indicator
                const checkHTML = `
                    <div class="absolute -top-3 -right-3 w-10 h-10 bg-primary text-white rounded-full flex items-center justify-center shadow-lg border-4 border-sand">
                        <span class="material-symbols-outlined text-sm font-bold">check</span>
                    </div>
                `;
                this.insertAdjacentHTML('beforeend', checkHTML);
            });
        });
    </script>
