<!DOCTYPE html>

<html class="light" dir="ltr" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sawiyya - First-Sign Watch</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&amp;family=Readex+Pro:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: '#0F6E6A',
                        'primary-dark': '#0A4F4C',
                        ink: '#16302E',
                        coral: '#E8654C',
                        gold: '#E6B24C',
                        sand: '#F6EFE3',
                        paper: '#FBF7EF',
                    },
                    borderRadius: {
                        'DEFAULT': '0.5rem',
                        'lg': '1rem',
                        'xl': '1.5rem',
                        '2xl': '24px',
                        '3xl': '40px',
                        'full': '9999px'
                    },
                    fontFamily: {
                        headline: ["Rubik", "sans-serif"],
                        display: ["Rubik", "sans-serif"],
                        body: ["Readex Pro", "sans-serif"],
                        label: ["Rubik", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Readex Pro', 'Lexend', sans-serif;
            background-color: #FBF7EF;
            color: #16302E;
            -webkit-tap-highlight-color: transparent;
        }
        
        .font-headline { font-family: 'Rubik', sans-serif; }
        .font-display { font-family: 'Rubik', sans-serif; }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Duolingo-style extruded button */
        .btn-extruded {
            position: relative;
            transition: all 0.1s ease;
            box-shadow: 0 6px 0 0 rgba(0,0,0,0.15);
        }
        .btn-extruded:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 0 rgba(0,0,0,0.15);
        }
        .btn-coral {
            background-color: #E8654C;
            box-shadow: 0 6px 0 0 #B64F3C;
        }
        .btn-coral:active {
            box-shadow: 0 2px 0 0 #B64F3C;
        }

        /* Progress indicator animation */
        @keyframes pulse-gold {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }
        .active-dot {
            animation: pulse-gold 2s infinite ease-in-out;
        }

        /* Custom Scrollbar for the container if needed */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen max-w-md mx-auto relative overflow-hidden">
<!-- Top Bar Component -->
<header class="flex justify-between items-center w-full px-6 py-4 z-50 bg-[#0F6E6A] dark:bg-[#0A4F4C]">
<button class="text-[#FBF7EF] hover:opacity-80 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-headline text-2xl font-bold tracking-tight text-[#FBF7EF]">Sawiyya</h1>
<button class="text-[#FBF7EF] hover:opacity-80 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="flex-1 px-6 pt-8 pb-32 overflow-y-auto no-scrollbar">
<!-- Header Section -->
<div class="mb-8">
<p class="font-headline text-xl font-bold text-ink/80 mb-1">
                Let's learn the first thing you'll say:
            </p>
<h2 class="font-headline text-4xl font-extrabold text-primary tracking-tight leading-tight">
                I love you · أحبك
            </h2>
</div>
<!-- Centerpiece Demonstration Card -->
<div class="relative bg-sand/50 rounded-3xl p-8 aspect-square flex flex-col items-center justify-center border-4 border-primary/5 shadow-inner">
<!-- Demonstration Placeholder Image -->
<div class="relative w-full h-full flex items-center justify-center">
<img class="w-full h-full object-cover rounded-2xl opacity-90 mix-blend-multiply" data-alt="A warm, brightly lit classroom setting where a kind Qatari woman in a modern abaya demonstrates the I Love You sign in sign language. The lighting is soft and golden, evocative of a Majlis at sunset. The visual style is premium digital photography with a shallow depth of field, focusing on her expressive hand gestures against the Sawiyya brand teal and sand palette." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbWeE98t7LPdXsvsxfTict7qNixW9a3HQgGcpJZbnpglr0wopLyxAvG5dmVnx8jJTVT5EcBZ4Hne6lTnZUBswtPf6NeBtZO3ttyOUWg7ohMKn88zIxKZV6WCv4SC9dlVQbIHwzunqjj2NmJHkB-1QAesBIHatF8T2ThBwfMyDXrAwtJGlePG5YEvPSF2VT6IqVUYeXZUHtshv5IN2UqS-xgjKPljxyFMBJMVMfduTHOvcOoJd4MUUPTOWqqTjQUT6ApCwmdPUKa5Xl"/>
<!-- Play / Replay Chip -->
<button class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-primary/20 backdrop-blur-md px-6 py-3 rounded-full flex items-center gap-2 text-primary font-bold border-2 border-primary/20 hover:scale-105 transition-transform active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span>Replay</span>
</button>
</div>
<!-- Footnote Tag -->
<div class="mt-6 flex flex-col items-center">
<div class="flex items-center gap-1.5 px-3 py-1 bg-ink/5 rounded-full mb-2">
<span class="material-symbols-outlined text-xs text-ink/60">info</span>
<p class="font-body text-[10px] uppercase tracking-wider font-bold text-ink/60">
                        Demo placeholder
                    </p>
</div>
<p class="font-body text-xs italic text-ink/40 text-center">
                    Real Deaf Qatari signer in Phase 2
                </p>
</div>
<!-- Artistic Flourish: Sparkles -->
<div class="absolute -top-4 -right-2 text-gold opacity-60">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</div>
<!-- Step Indicator -->
<div class="mt-10 flex flex-col items-center gap-4">
<div class="flex items-center gap-8">
<!-- Watch (Active) -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-gold flex items-center justify-center active-dot shadow-lg border-4 border-white">
<span class="material-symbols-outlined text-white text-xl" style="font-variation-settings: 'FILL' 1;">visibility</span>
</div>
<span class="font-label text-[10px] font-extrabold uppercase tracking-widest text-gold">Watch</span>
</div>
<!-- Line Divider -->
<div class="w-12 h-1 bg-ink/10 rounded-full -mt-6"></div>
<!-- Try (Inactive) -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-ink/10 flex items-center justify-center text-ink/30">
<span class="material-symbols-outlined text-xl">front_hand</span>
</div>
<span class="font-label text-[10px] font-extrabold uppercase tracking-widest text-ink/30">Try</span>
</div>
<!-- Line Divider -->
<div class="w-12 h-1 bg-ink/10 rounded-full -mt-6"></div>
<!-- Celebrate (Inactive) -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-ink/10 flex items-center justify-center text-ink/30">
<span class="material-symbols-outlined text-xl">celebration</span>
</div>
<span class="font-label text-[10px] font-extrabold uppercase tracking-widest text-ink/30">Win</span>
</div>
</div>
</div>
</main>
<!-- Footer Action -->
<div class="fixed bottom-0 left-0 w-full p-6 pb-8 bg-paper/80 backdrop-blur-sm">
<button class="w-full py-5 rounded-2xl btn-extruded btn-coral text-white font-headline text-xl font-black flex items-center justify-center gap-3">
<span>Now you try</span>
<img alt="I Love You Sign" class="w-8 h-8 object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLsZ2bB-ahCNHFC3CKrqa_AB1KLtPr357v47Hp9-IYZi1DqBJ52rwWzm_5YI9ySWLg6763HjJOkLSP8H9e_gkxQYpe1xKfFdR2KuT7tGc6t2ZByk7DGgucpxKpCY-5lskjsOukCOsVQuZuCGr29sChKiCeuIZgHk8Z-KiGtgsN0vXT-rOAlXxZNdGoG2CWtkIFlYQCOL2Bv02Z0uC2uZYnBG_ZR0Zxymn4jNr7HtvJkTnxyeviOicIP19jU"/>
</button>
</div>
<!-- Hidden Bottom Nav suppression (as per rule: suppression on task-focused journeys) -->
<script>
        // Micro-interactions
        document.addEventListener('DOMContentLoaded', () => {
            const replayBtn = document.querySelector('button .material-symbols-outlined:contains("play_arrow")')?.parentElement;
            if(replayBtn) {
                replayBtn.addEventListener('click', () => {
                    // Feedback effect
                    replayBtn.style.transform = 'scale(0.9)';
                    setTimeout(() => replayBtn.style.transform = 'scale(1)', 100);
                });
            }
        });
    </script>
</body></html>
