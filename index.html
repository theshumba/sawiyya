<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0F6E6A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Sawiyya — learn Qatari Sign Language. Teach the world, don't fix the child." />
    <title>Sawiyya · سويّة — Learn to sign, together</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&family=Rubik:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400..700,0..1,0&display=swap"
      rel="stylesheet"
    />
    <!--
      Pre-React boot splash (STATE A · SPLASH from specs/boot.md).
      Self-contained: styles + keyframes live here so the splash paints on first
      frame, before src/main.tsx loads styles.css. React's createRoot().render()
      replaces #root's children on mount, so this splash disappears automatically.
      Fanan (wave pose) is ported 1:1 from src/components/Fanan.tsx — pure divs,
      identical geometry. Fanan NEVER mirrors, so the markup is dir-agnostic.
    -->
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
        background: linear-gradient(165deg, #0f6e6a, #0a4f4c);
        font-family: "Readex Pro", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      /* Fanan float wrapper (design: animation:float 2.6s) */
      #boot-splash .boot-fanan {
        animation: boot-float 2.6s ease-in-out infinite;
      }
      #boot-splash .boot-fanan-scale {
        transform: scale(1.25);
        transform-origin: center bottom;
        width: 120px;
        height: 118px;
      }
      #boot-splash .boot-word {
        font: 800 42px/1 Rubik, sans-serif;
        color: #fbf7ef;
        margin-top: 20px;
        letter-spacing: -0.02em;
        animation: boot-pop 0.6s ease both;
      }
      #boot-splash .boot-word-ar {
        font: 600 20px/1 "Readex Pro", sans-serif;
        color: #f0c879;
        margin-top: 6px;
      }
      #boot-splash .boot-tagline {
        font: 400 13px/1.4 "Readex Pro", sans-serif;
        color: rgba(255, 255, 255, 0.72);
        margin-top: 14px;
        max-width: 230px;
        text-align: center;
      }
      #boot-splash .boot-dots {
        display: flex;
        gap: 6px;
        margin-top: 26px;
      }
      #boot-splash .boot-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #f0c879;
        animation: boot-ping 1.2s ease-out infinite;
      }
      #boot-splash .boot-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      #boot-splash .boot-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      #boot-splash .boot-paw {
        animation: boot-float 1s ease-in-out infinite;
      }
      @keyframes boot-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-7px);
        }
      }
      @keyframes boot-pop {
        0% {
          transform: scale(0.5);
          opacity: 0;
        }
        60% {
          transform: scale(1.12);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes boot-ping {
        0% {
          transform: scale(0.9);
          opacity: 0.85;
        }
        70% {
          transform: scale(1.3);
          opacity: 0;
        }
        100% {
          opacity: 0;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash .boot-fanan,
        #boot-splash .boot-word,
        #boot-splash .boot-dots span,
        #boot-splash .boot-paw {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- STATE A · SPLASH — teal gradient, brand lockup, Fanan wave, loader dots -->
      <div id="boot-splash" role="status" aria-live="polite" aria-label="Sawiyya">
        <div class="boot-fanan">
          <!-- Fanan pose="wave" scale=1.25 — ported 1:1 from src/components/Fanan.tsx -->
          <div class="boot-fanan-scale">
            <div style="position:relative;width:120px;height:118px;">
              <!-- ears -->
              <div style="position:absolute;top:0;left:12px;width:36px;height:54px;border-radius:66% 34% 48% 52%/76% 76% 26% 26%;background:#E6B24C;transform:rotate(-20deg);box-shadow:inset 0 -4px 0 rgba(0,0,0,.06);">
                <div style="position:absolute;top:11px;left:11px;width:14px;height:30px;border-radius:50%;background:#F08A75;"></div>
              </div>
              <div style="position:absolute;top:0;right:12px;width:36px;height:54px;border-radius:34% 66% 52% 48%/76% 76% 26% 26%;background:#E6B24C;transform:rotate(20deg);box-shadow:inset 0 -4px 0 rgba(0,0,0,.06);">
                <div style="position:absolute;top:11px;right:11px;width:14px;height:30px;border-radius:50%;background:#F08A75;"></div>
              </div>
              <!-- head -->
              <div style="position:absolute;top:28px;left:19px;width:82px;height:78px;border-radius:50% 50% 47% 47%;background:#E6B24C;box-shadow:inset 0 -7px 0 rgba(0,0,0,.07);"></div>
              <!-- muzzle -->
              <div style="position:absolute;top:74px;left:37px;width:46px;height:32px;border-radius:50%;background:#FBF7EF;"></div>
              <!-- eyes (open dots) -->
              <div style="position:absolute;top:54px;left:37px;width:14px;height:15px;border-radius:50%;background:#16302E;">
                <div style="position:absolute;top:3px;right:3px;width:4px;height:4px;border-radius:50%;background:#FBF7EF;"></div>
              </div>
              <div style="position:absolute;top:54px;left:70px;width:14px;height:15px;border-radius:50%;background:#16302E;">
                <div style="position:absolute;top:3px;right:3px;width:4px;height:4px;border-radius:50%;background:#FBF7EF;"></div>
              </div>
              <!-- nose -->
              <div style="position:absolute;top:73px;left:54px;width:12px;height:9px;border-radius:50%;background:#16302E;"></div>
              <!-- smile mouth -->
              <div style="position:absolute;top:84px;left:50px;width:20px;height:10px;border:2.5px solid #16302E;border-top:none;border-radius:0 0 20px 20px;"></div>
              <!-- raised paw (wave) -->
              <div class="boot-paw" style="position:absolute;top:44px;right:-4px;width:18px;height:18px;border-radius:50%;background:#E6B24C;box-shadow:inset 0 -3px 0 rgba(0,0,0,.07);transform-origin:bottom center;"></div>
            </div>
          </div>
        </div>
        <!-- Brand lockup: Latin logotype + Arabic wordmark, stacked on every language -->
        <div class="boot-word">Sawiyya</div>
        <div class="boot-word-ar">سويّة</div>
        <!-- splashTagline (inlined pre-React; localized by the script below) -->
        <div class="boot-tagline" id="boot-tagline">
          Learn to sign. Connect with someone who can't hear you.
        </div>
        <div class="boot-dots" aria-hidden="true"><span></span><span></span><span></span></div>
      </div>
    </div>
    <noscript>Sawiyya needs JavaScript and a camera to teach you to sign. سويّة</noscript>
    <script>
      // Localize the splash tagline + document dir BEFORE React boots, so the
      // splash matches the user's language with no flash. The persisted profile
      // wins; on first run the landing's ?lang=ar handoff decides (M27).
      // Mirrors t("splashTagline", lang) — copy inlined since this runs
      // pre-bundle. Store: zustand persist "sawiyya.app.v1" → state.profiles.
      (function () {
        try {
          var lang = null;
          var raw = localStorage.getItem("sawiyya.app.v1");
          if (raw) {
            var s = (JSON.parse(raw) || {}).state || {};
            var p = (s.profiles || []).filter(function (x) {
              return x && x.id === s.activeProfileId;
            })[0];
            lang = (p && p.language) || null;
          }
          if (!lang) {
            var q = new URLSearchParams(window.location.search).get("lang");
            lang = q === "ar" ? "ar" : "en";
          }
          if (lang === "ar") {
            document.documentElement.lang = "ar";
            document.documentElement.dir = "rtl";
            var el = document.getElementById("boot-tagline");
            if (el) el.textContent = "تعلّم الإشارة. تواصل مع من لا يسمعك.";
          }
        } catch (e) {
          /* splash falls back to English default */
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
